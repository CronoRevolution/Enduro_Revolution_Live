<title>Clasificación en Vivo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f12;--panel:#17171d;--border:#2a2a35;--text:#f0f0f5;--dim:#8888aa;
  --accent:#e8231a;--cyan:#22d3ee;--green:#4ade80;--amber:#fbbf24;--red:#f87171;
  --purple:#a855f7;--blue:#60a5fa;
}
body.light{
  --bg:#f8f9fa;--panel:#ffffff;--border:#dee2e6;--text:#212529;--dim:#868e96;
  --accent:#c00000;--cyan:#0891b2;--green:#16a34a;--amber:#d97706;--red:#dc2626;
  --purple:#7c3aed;--blue:#2563eb;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden}

/* ── Header ── */
.header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);
  padding:0.75rem 1rem;display:flex;align-items:center;gap:0.75rem;}
.header-title{flex:1;font-size:1rem;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-race{font-size:0.7rem;color:var(--dim);margin-top:1px}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:all .3s}
.status-dot.live{background:var(--green);box-shadow:0 0 0 3px rgba(74,222,128,0.2);animation:pulse 2s infinite}
.status-dot.stale{background:var(--amber)}
.status-dot.offline{background:var(--red)}
.status-age{font-size:0.62rem;color:var(--dim);font-family:monospace;flex-shrink:0;white-space:nowrap}
.status-age.stale{color:var(--amber)}
.status-age.offline{color:var(--red)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(74,222,128,0.2)}50%{box-shadow:0 0 0 6px rgba(74,222,128,0)}}
.theme-btn{background:transparent;border:1px solid var(--border);color:var(--dim);
  border-radius:6px;padding:0.3rem 0.45rem;cursor:pointer;font-size:0.9rem;line-height:1;flex-shrink:0;}
.theme-btn:active{opacity:0.7;}
.refresh-btn{background:none;border:1px solid var(--border);color:var(--dim);padding:0.3rem 0.7rem;
  border-radius:20px;font-size:0.7rem;cursor:pointer;font-family:inherit}
.refresh-btn:active{opacity:0.7}

/* ── Views ── */
.view{display:none;animation:fadeIn .2s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── Category list ── */

.cat-list{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;padding:0.75rem}
.cat-list.single .cat-card{grid-column:1/-1}
.cat-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;
cursor:pointer;overflow:hidden;transition:transform .15s;
display:flex;flex-direction:column}
.cat-card:active{transform:scale(0.97)}
.cat-card-accent{height:4px;width:100%;flex-shrink:0}
.cat-card-body{padding:0.85rem 0.9rem 0.6rem;flex:1;display:flex;flex-direction:column;gap:0.35rem}
.cat-card-name{font-size:0.9rem;font-weight:800;line-height:1.2;color:var(--text)}
.cat-card-total{font-size:1.4rem;font-weight:900;font-family:monospace;line-height:1}
.cat-card-leader{font-size:0.62rem;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.cat-card-bar-wrap{background:var(--border);border-radius:3px;height:4px;overflow:hidden;margin-top:0.4rem}
.cat-card-bar{height:100%;border-radius:3px;transition:width .4s ease}
.cat-card-footer{display:flex;justify-content:space-between;align-items:center;
padding:0.4rem 0.9rem;border-top:1px solid var(--border);
font-size:0.65rem;color:var(--dim)}
.cat-card-footer-n{font-weight:700;color:var(--text)}

/* ── Tab bar (category / scratch / transversal) ── */
.tab-bar{display:flex;gap:0.35rem;padding:0.6rem 0.75rem 0;overflow-x:auto;
  scrollbar-width:none;border-bottom:1px solid var(--border);flex-shrink:0}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:0.38rem 0.9rem;border-radius:20px;border:none;cursor:pointer;
  font-weight:700;font-size:0.72rem;font-family:inherit;transition:all .15s}
.tab-btn.active-cats{background:var(--accent);color:#fff}
.tab-btn.active-scratch{background:var(--purple);color:#fff}
.tab-btn.active-tv{background:#0891b2;color:#fff}
.tab-btn.inactive{background:var(--panel);color:var(--dim)}

/* ── Back button ── */
.back-btn{background:none;border:none;color:var(--cyan);font-size:0.85rem;font-weight:700;
  cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:0.3rem;padding:0.4rem 0}

/* ── Classification table ── */
.clasif-view{display:flex;flex-direction:column;height:calc(100vh - 56px)}
.clasif-header{padding:0.6rem 0.9rem;flex-shrink:0;background:var(--bg)}
.clasif-cat-title{font-size:1.1rem;font-weight:800;margin-top:0.1rem}
.clasif-meta{font-size:0.68rem;color:var(--dim);margin-top:2px}
.clasif-scroll{flex:1;overflow:auto;padding:0 0.5rem 1rem}

.pilot-row{display:flex;align-items:center;gap:0.6rem;padding:0.7rem 0.7rem;
  border-radius:10px;margin-bottom:0.35rem;cursor:pointer;
  background:var(--panel);border:1px solid var(--border);transition:all .15s}
.pilot-row:active{transform:scale(0.98)}
.pilot-row.podium-1{border-color:rgba(251,191,36,0.4);background:rgba(251,191,36,0.06)}
.pilot-row.podium-2{border-color:rgba(148,163,184,0.4);background:rgba(148,163,184,0.05)}
.pilot-row.podium-3{border-color:rgba(205,124,58,0.4);background:rgba(205,124,58,0.05)}
.pilot-row.dnf{opacity:0.55}
.pilot-row.dsq{opacity:0.4}
.pr-pos{font-size:1.2rem;font-weight:900;min-width:36px;text-align:center;flex-shrink:0}
.pr-dorsal{font-family:monospace;font-weight:800;font-size:1rem;color:var(--accent);
  min-width:36px;text-align:center;flex-shrink:0}
.pr-info{flex:1;min-width:0}
.pr-name{font-size:0.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-cat{font-size:0.65rem;color:var(--dim);margin-top:1px}
.pr-right{text-align:right;flex-shrink:0}
.pr-total{font-family:monospace;font-weight:800;font-size:0.9rem;color:var(--red)}
.pr-diff{font-family:monospace;font-size:0.65rem;color:var(--dim)}
.pr-status{font-size:0.72rem;font-weight:700;padding:0.15rem 0.45rem;border-radius:6px}
.pr-status.fin{background:rgba(74,222,128,0.15);color:var(--green)}
.pr-status.dnf{background:rgba(251,191,36,0.15);color:var(--amber)}
.pr-status.dsq{background:rgba(248,113,113,0.15);color:var(--red)}
.pr-status.prog{background:rgba(34,211,238,0.1);color:var(--cyan)}

/* ── Pilot detail ── */
.detail-view{padding:0.75rem;overflow:auto;height:calc(100vh - 56px)}
.detail-hero{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:1rem 1.1rem;margin-bottom:0.75rem;display:flex;gap:1rem;align-items:center}
.detail-dorsal{font-family:monospace;font-size:2.5rem;font-weight:900;color:var(--accent);line-height:1}
.detail-info{flex:1}
.detail-name{font-size:1rem;font-weight:700;line-height:1.2}
.detail-sub{font-size:0.72rem;color:var(--dim);margin-top:3px}
.detail-pos{text-align:right}
.detail-pos-num{font-size:2rem;font-weight:900;line-height:1}
.detail-pos-label{font-size:0.62rem;color:var(--dim)}

.section-title{font-size:0.65rem;font-weight:700;color:var(--dim);text-transform:uppercase;
  letter-spacing:0.08em;margin-bottom:0.4rem;margin-top:0.75rem}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:0.4rem;margin-bottom:0.1rem}
.detail-cell{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:0.55rem 0.7rem}
.detail-cell-label{font-size:0.6rem;color:var(--dim);margin-bottom:2px}
.detail-cell-val{font-family:monospace;font-weight:700;font-size:0.88rem}
.detail-cell-val.good{color:var(--blue)}
.detail-cell-val.pen{color:var(--red)}
.detail-cell-val.total{color:var(--red);font-size:1.1rem}
.detail-cell-val.green{color:var(--green)}

/* ── Empty / loading ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3rem 1.5rem;text-align:center;color:var(--dim)}
.empty-icon{font-size:3rem;margin-bottom:0.75rem}
.empty-text{font-size:0.85rem;line-height:1.5}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;gap:0.5rem;color:var(--dim)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Update toast ── */
.toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--panel);border:1px solid var(--border);border-radius:20px;
  padding:0.4rem 1rem;font-size:0.72rem;color:var(--green);opacity:0;transition:all .3s;
  pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.nav-btn{background:none;border:1px solid var(--border);color:var(--cyan);
  font-size:1.25rem;font-weight:700;padding:0.25rem 0.6rem;border-radius:8px;
  cursor:pointer;transition:background .15s;line-height:1}
.nav-btn:hover{background:var(--panel)}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0">
    <button class="nav-btn" id="btnBack" onclick="navBack()" style="display:none" aria-label="Atrás">‹</button>
    <button class="nav-btn" id="btnHome" onclick="navHome()" style="display:none" aria-label="Inicio" title="Inicio">⌂</button>
  </div>
  <div style="flex:1;min-width:0;margin:0 0.4rem">
    <div class="header-title" id="hTitle">Clasificación en Vivo</div>
    <div class="header-race" id="hRace">Cargando…</div>
  </div>
  <div style="display:flex;align-items:center;gap:0.4rem;flex-shrink:0">
    <span class="status-dot offline" id="statusDot"></span>
    <span class="status-age offline" id="statusAge">—</span>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Tema">☀️</button>
    <button class="refresh-btn" onclick="fetchData()">↻</button>
  </div>
</div>

<!-- VIEW: Category list -->
<div class="view active" id="vCats">
  <div id="tabBar" class="tab-bar" style="display:none"></div>
  <div class="cat-list" id="catList">
    <div class="loading"><div class="spinner"></div> Cargando…</div>
  </div>
</div>

<!-- VIEW: Classification list -->
<div class="view" id="vClasif">
  <div class="clasif-view">
    <div class="clasif-header">
      <button class="back-btn" onclick="showCats()">← Categorías</button>
      <div class="clasif-cat-title" id="clasifTitle"></div>
      <div class="clasif-meta" id="clasifMeta"></div>
    </div>
    <div class="clasif-scroll" id="clasifList"></div>
  </div>
</div>

<!-- VIEW: Pilot detail -->
<div class="view" id="vDetail">
  <div class="detail-view" id="detailContent">
    <button class="back-btn" onclick="showClasif()">← Clasificación</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Configuración ─────────────────────────────────────────────────────────
// Si el live.json está en el mismo repo (GitHub Pages), la URL relativa funciona.
// Si quieres apuntar a otro sitio, cambia DATA_URL:
// DATA_URL: usa el hash de la URL para sobreescribir, p.ej.:
// index.html#https://usuario.github.io/repo/live.json
// URL primaria (desde el hash) y fallback (github.io relativo) en caso de fallo
const DATA_URL_PRIMARY = (window.location.hash && window.location.hash.length > 1)
  ? window.location.hash.slice(1)
  : './live.json';
// Si la primaria es raw.githubusercontent.com, usa github.io como fallback
const DATA_URL_FALLBACK = DATA_URL_PRIMARY.includes("raw.githubusercontent.com")
  ? './live.json'
  : null;
let gCurrentUrl = DATA_URL_PRIMARY;
let gFailStreak = 0;
const POLL_MS_VISIBLE = 8000;   // cada 8s con la app visible (máxima inmediatez)
const POLL_MS_HIDDEN  = 30000;  // cada 30s en segundo plano (ahorra batería)

// ── Estado ────────────────────────────────────────────────────────────────
let gData = null;
let gView = 'cats';    // cats | clasif | detail
let gCatSel = null;    // nombre de categoría o "scratch" o "tv:LABEL"
let gPilotId = null;
let gLastEtag = null;
let gPollTimer = null;
let gLastFetchTs = null;  // timestamp del último fetch con éxito
let gAgeTimer = null;

// ── Fetch datos ────────────────────────────────────────────────────────────
// ── Tema oscuro/claro ────────────────────────────────────────────────────────
let gDark = localStorage.getItem('er_mobile_dark') !== '0';
function applyTheme() {
  document.body.classList.toggle('light', !gDark);
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = gDark ? '☀️' : '🌙';
}
function toggleTheme() {
  gDark = !gDark;
  localStorage.setItem('er_mobile_dark', gDark ? '1' : '0');
  applyTheme();
}
// Apply theme after DOM is ready
document.addEventListener('DOMContentLoaded', applyTheme);
// Also apply immediately if DOM already loaded (inline script)
if (document.readyState !== 'loading') applyTheme();

async function fetchData() {
  try {
    const headers = {};
    if (gLastEtag) headers['If-None-Match'] = gLastEtag;
    const resp = await fetch(gCurrentUrl + '?_=' + Date.now(), { headers });
    if (resp.status === 304) { gLastFetchTs = Date.now(); gFailStreak = 0; setStatus('live'); updateAge(); return; }
    if (!resp.ok) throw new Error(resp.status);
    gLastEtag = resp.headers.get('ETag');
    const raw = await resp.json();
    const changed = JSON.stringify(raw) !== JSON.stringify(gData);
    gData = raw;
    gLastFetchTs = Date.now();
    gFailStreak = 0;
    setStatus('live');
    updateAge();
    if (changed) {
      renderAll();
      showToast('✓ Actualizado');
    }
  } catch(e) {
    gFailStreak++;
    // Tras 3 fallos consecutivos con la URL primaria, probar el fallback
    if (gFailStreak >= 3 && DATA_URL_FALLBACK && gCurrentUrl !== DATA_URL_FALLBACK) {
      console.warn('Cambiando a URL fallback:', DATA_URL_FALLBACK);
      gCurrentUrl = DATA_URL_FALLBACK;
      gLastEtag = null;
      gFailStreak = 0;
      showToast('↻ Usando red alternativa…');
      setTimeout(fetchData, 500);
      return;
    }
    setStatus('offline');
  }
}

function setStatus(s) {
  const d = document.getElementById('statusDot');
  if (d) d.className = 'status-dot ' + s;
  const a = document.getElementById('statusAge');
  if (a) a.className = 'status-age ' + s;
}

function updateAge() {
  const a = document.getElementById('statusAge');
  if (!a) return;
  if (!gLastFetchTs) { a.textContent = '—'; return; }
  const sec = Math.round((Date.now() - gLastFetchTs) / 1000);
  let txt;
  if (sec < 60) txt = 'hace ' + sec + 's';
  else if (sec < 3600) txt = 'hace ' + Math.floor(sec/60) + 'min';
  else txt = 'hace ' + Math.floor(sec/3600) + 'h';
  a.textContent = txt;
  // Change color if stale
  if (sec > 60) {
    a.className = 'status-age stale';
    const d = document.getElementById('statusDot');
    if (d && !d.className.includes('offline')) d.className = 'status-dot stale';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Parsers / helpers ─────────────────────────────────────────────────────
function parseT(s) {
  if (!s) return null;
  s = String(s).trim();
  const p = s.split(':');
  try {
    if (p.length === 3) return +p[0]*3600 + +p[1]*60 + +p[2];
    if (p.length === 2) return s.includes('.') ? +p[0]*60 + +p[1] : +p[0]*3600 + +p[1]*60;
  } catch(e) {}
  return null;
}

function fmtT(s) {
  if (!s) return '—';
  const a = Math.abs(s), ms = Math.round((a%1)*1000), sec = Math.floor(a)%60,
    m = Math.floor(Math.floor(a)/60), h = Math.floor(m/60), mm = m%60;
  return h > 0 ? `${h}:${String(mm).padStart(2,'0')}:${String(sec).padStart(2,'0')}.${String(ms).padStart(3,'0')}`
               : `${mm}:${String(sec).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
}

function fmtPen(s) {
  if (!s) return '';
  const a = Math.abs(Math.round(s));
  return `${Math.floor(a/60)}'${String(a%60).padStart(2,'0')}"`;
}

function fmtHHMM(s) {
  if (!s) return '—';
  const a = Math.floor(s) % 86400;
  return `${String(Math.floor(a/3600)).padStart(2,'0')}:${String(Math.floor((a%3600)/60)).padStart(2,'0')}`;
}

function getNumLaps(rider, cfg) {
  const cat = (cfg.categories||[]).find(c => c.name === rider.categoria);
  const v = cat && cat.numLaps;
  try { return v ? parseInt(v) : parseInt(cfg.numLaps||1); } catch(e) { return 1; }
}

function getChTime(rider, cfg, lap, ctrl) {
  const k = `${lap}-${ctrl}`;
  const cat = (cfg.categories||[]).find(c => c.name === rider.categoria);
  if (cat && cat.chtimes && cat.chtimes[k] != null) return parseFloat(cat.chtimes[k]);
  const v = cfg.defaultCHTimes && cfg.defaultCHTimes[k];
  return v != null ? parseFloat(v) : 30;
}

function stageScores(cfg, s, l, cat) {
  if (cat) { const v = cat.stageScoring && cat.stageScoring[`s${s}-l${l}`]; if (v != null) return !!v; }
  const v = cfg.stageScoring && cfg.stageScoring[`s${s}-l${l}`];
  return v == null ? true : !!v;
}

function computeSchedule(riders, cfg) {
  const cats = cfg.categories || [];
  const catOrd = cats.map(c => c.name);
  const groups = {}; catOrd.forEach(n => groups[n] = []);
  const unknown = [];
  riders.filter(r => !r.dns).forEach(r => {
    (groups[r.categoria] !== undefined ? groups[r.categoria] : unknown).push(r);
  });
  const ordered = [];
  catOrd.forEach(name => {
    const cat = cats.find(c => c.name === name);
    const m = [...(groups[name]||[])].sort((a,b) => parseInt(a.dorsal)-parseInt(b.dorsal));
    if (cat && cat.reverseTop10) {
      const top = m.filter(r => parseInt(r.dorsal) <= 10).reverse();
      const rest = m.filter(r => parseInt(r.dorsal) > 10);
      ordered.push(...top, ...rest);
    } else ordered.push(...m);
  });
  unknown.sort((a,b) => parseInt(a.dorsal)-parseInt(b.dorsal));
  ordered.push(...unknown);
  const base = parseT(cfg.startTime) || (10*3600+15*60);
  const cad = (parseInt(cfg.cadence)||1)*60, grp = Math.max(1, parseInt(cfg.groupSize)||1);
  let cursor = base;
  return ordered.map((rider, idx) => {
    if (idx === 0) cursor = base;
    else {
      if (rider.categoria !== ordered[idx-1].categoria) cursor = Math.ceil((cursor+1)/60)*60;
      else if (Math.floor(idx/grp) > Math.floor((idx-1)/grp)) cursor += cad;
    }
    return { ...rider, startSecs: cursor, startStr: fmtHHMM(cursor) };
  });
}

function buildResults(schedule, cfg, timing, stageData) {
  const nS = parseInt(cfg.numStages)||2, nC = parseInt(cfg.numTimeControls)||1;
  const cats = cfg.categories||[];
  return schedule.map(r => {
    const nL = getNumLaps(r, cfg);
    const rt = timing[r.id] || {};
    const cat = cats.find(c => c.name === r.categoria);
    // Expected CH times
    let cur = parseT(rt.actualStart) || r.startSecs;
    const chExpected = {}, chPens = {};
    let tcPen = 0;
    for (let lap = 1; lap <= nL; lap++) {
      for (let ctrl = 1; ctrl <= nC; ctrl++) {
        const exp = cur + getChTime(r, cfg, lap, ctrl)*60;
        const stored = rt[`${lap}-${ctrl}`];
        const actual = stored ? parseT(stored.actual) : null;
        const diff = actual != null ? actual - exp : 0;
        chExpected[`${lap}-${ctrl}`] = exp;
        chPens[`${lap}-${ctrl}`] = Math.abs(diff);
        tcPen += Math.abs(diff);
        cur = actual != null ? actual : exp;
      }
    }
    const actualStart = parseT(rt.actualStart);
    const startPen = actualStart ? Math.max(0, actualStart - r.startSecs) : 0;
    const manStr = rt.manualPenalty||'';
    let manPen = 0;
    if (manStr) {
      if (manStr.includes(':')) { const p = manStr.split(':'); try { manPen = parseInt(p[0])*60+parseInt(p[1]); } catch(e){} }
      else { try { manPen = parseFloat(manStr); } catch(e){} }
    }
    // Stage times
    const stTimes = {}, chActual = {};
    let stTotal = 0;
    for (let s = 1; s <= nS; s++) {
      const sd = (stageData && stageData[`stage_${s}`]) || {};
      for (let l = 1; l <= nL; l++) {
        if (!stageScores(cfg, s, l, cat)) continue;
        const ov = rt[`crono_${s}_${l}`];
        const raw = (ov && ov.actual) || (sd[r.dorsal] && sd[r.dorsal][l]);
        const sc = parseT(raw);
        if (sc) { stTimes[`${s}-${l}`] = sc; stTotal += sc; }
      }
    }
    // CH actual times
    for (let lap = 1; lap <= nL; lap++) for (let ctrl = 1; ctrl <= nC; ctrl++) {
      const stored = rt[`${lap}-${ctrl}`];
      if (stored && stored.actual) chActual[`${lap}-${ctrl}`] = stored.actual;
    }
    const penTotal = startPen + tcPen + manPen;
    const finished = rt.finished || false;
    const status = rt.status || 'ok';
    return { ...r, nL, nC, chPens, chActual, chExpected,
      startPen, manPen, tcPen, penTotal, stTimes, stTotal,
      total: penTotal + stTotal, status, finished };
  });
}

// ── Render ────────────────────────────────────────────────────────────────
function renderAll() {
  if (!gData) return;
  const cfg = gData.config || {};
  document.getElementById('hTitle').textContent = cfg.name || 'Clasificación en Vivo';
  document.getElementById('hRace').textContent = cfg.date || '';
  renderTabBar();
  if (gView === 'cats') renderCatList();
  else if (gView === 'clasif') renderClasif();
  else if (gView === 'detail') renderDetail();
}

function renderTabBar() {
  const cfg = gData.config || {};
  const riders = gData.riders || [];
  const scratchCats = (cfg.categories||[]).filter(c => c.inScratch).map(c => c.name);
  const tvGroups = [...new Set(riders.map(r => r.transversal||'').filter(v => v))].sort();
  const bar = document.getElementById('tabBar');
  if (!scratchCats.length && !tvGroups.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  let html = `<button class="tab-btn ${gCatSel === '__cats__' || !gCatSel ? 'active-cats' : 'inactive'}" onclick="switchTab('__cats__')">Por categorías</button>`;
  if (scratchCats.length) html += `<button class="tab-btn ${gCatSel === '__scratch__' ? 'active-scratch' : 'inactive'}" onclick="switchTab('__scratch__')">✨ Scratch</button>`;
  tvGroups.forEach(label => {
    const active = gCatSel === '__tv__' + label;
    html += `<button class="tab-btn ${active ? 'active-tv' : 'inactive'}" onclick="switchTab('__tv__${label}')">🏅 ${label}</button>`;
  });
  bar.innerHTML = html;
}

function switchTab(sel) {
  gCatSel = sel;
  renderTabBar();
  renderCatList();
}

function renderCatList() {
  if (!gData) return;
  const cfg = gData.config || {};
  const timing = gData.timing || {};
  const stageData = gData.stageData || {};
  const allRiders = gData.riders || [];
  const schedule = computeSchedule(allRiders.filter(r => !r.dns), cfg);
  const results = buildResults(schedule, cfg, timing, stageData);

  const sel = gCatSel || '__cats__';
  let catsToShow;
  if (sel === '__scratch__') {
    const scratchCats = (cfg.categories||[]).filter(c => c.inScratch).map(c => c.name);
    catsToShow = [{name:'Scratch', riders: results.filter(r => scratchCats.includes(r.categoria))}];
  } else if (sel.startsWith('__tv__')) {
    const label = sel.slice(6);
    const catNames = [...new Set(results.filter(r => r.transversal === label).map(r => r.categoria))];
    catsToShow = catNames.map(cn => ({name: cn, riders: results.filter(r => r.transversal === label && r.categoria === cn)}));
  } else {
    catsToShow = (cfg.categories||[]).map(cat => ({
      name: cat.name,
      riders: results.filter(r => r.categoria === cat.name)
    })).filter(c => c.riders.length > 0);
  }

  const list = document.getElementById('catList');
  if (!catsToShow.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🏁</div><div class="empty-text">Sin datos aún</div></div>';
    return;
  }

  list.innerHTML = (() => {
    const ACCENTS = ['#e8231a','#0891b2','#16a34a','#d97706','#7c3aed','#db2777','#0d9488','#ea580c'];
    const html = catsToShow.map(({name, riders}, idx) => {
      const accent = ACCENTS[idx % ACCENTS.length];
      const finished = riders.filter(r => (r.finished || r.stTotal > 0) && r.status === 'ok');
      const dnf     = riders.filter(r => r.status === 'dnf');
      const dsq     = riders.filter(r => r.status === 'dsq');
      const out     = dnf.length + dsq.length;
      const active  = riders.length - out;           // pilotos aún en carrera
      const total   = riders.length;
      // Barra: verde=finalizados, ámbar=retirados/DSQ, fondo=en carrera
      const pctFin = total > 0 ? (finished.length / total) * 100 : 0;
      const pctOut = total > 0 ? (out / total) * 100 : 0;
      const leader = [...finished].sort((a,b) => a.total - b.total)[0];
      const leaderName = leader ? leader.fullName.split(',')[0].trim() : '';
      const leaderTime = leader ? fmtT(leader.total) : '';
      const leaderStr = leaderName && leaderTime ? leaderName + ' · ' + leaderTime : (total > 0 ? 'En curso' : 'Sin datos');
      const outStr = out > 0 ? ` · <span style="color:#f59e0b">${out} ret/dsq</span>` : '';
      return `
        <div class="cat-card" onclick="showClasifFor('${encodeURIComponent(name)}','${encodeURIComponent(sel)}')">
          <div class="cat-card-accent" style="background:${accent}"></div>
          <div class="cat-card-body">
            <div class="cat-card-name">${name}</div>
            <div class="cat-card-total" style="color:${accent}">${finished.length > 0 ? finished.length : '—'}<span style="font-size:0.7rem;font-weight:500;opacity:0.7"> fin.</span></div>
            <div class="cat-card-leader">${leaderStr}</div>
            <div class="cat-card-bar-wrap" style="position:relative;overflow:hidden">
              <div style="position:absolute;left:${pctFin}%;width:${pctOut}%;height:100%;background:#f59e0b;opacity:0.7"></div>
              <div class="cat-card-bar" style="width:${pctFin}%;background:${accent}"></div>
            </div>
          </div>
          <div class="cat-card-footer">
            <span>${active} en carrera${outStr}</span>
            <span class="cat-card-footer-n">${total}</span>
          </div>
        </div>`;
    }).join('');
    // Single category = full width
    const listEl = document.getElementById('catList');
    if (catsToShow.length === 1) listEl.classList.add('single');
    else listEl.classList.remove('single');
    return html;
  })();
}

function showClasifFor(catEnc, selEnc) {
  gCatSel = decodeURIComponent(selEnc);
  gView = 'clasif';
  window._clasifCat = decodeURIComponent(catEnc);
  renderClasif();
  showView('vClasif');
  // Guardar TANTO el nombre de categoría (catName) COMO el filtro (catSel)
  history.pushState({view:'clasif', catName: window._clasifCat, catSel: gCatSel}, '', '');
}

function renderClasif() {
  if (!gData) return;
  const catName = window._clasifCat;
  const cfg = gData.config || {};
  const timing = gData.timing || {};
  const stageData = gData.stageData || {};
  const allRiders = gData.riders || [];
  const schedule = computeSchedule(allRiders.filter(r => !r.dns), cfg);
  let results = buildResults(schedule, cfg, timing, stageData);

  const sel = gCatSel || '__cats__';
  if (sel === '__scratch__') {
    const sc = (cfg.categories||[]).filter(c => c.inScratch).map(c => c.name);
    results = results.filter(r => sc.includes(r.categoria));
  } else if (sel.startsWith('__tv__')) {
    const label = sel.slice(6);
    results = results.filter(r => r.transversal === label && r.categoria === catName);
  } else {
    results = results.filter(r => r.categoria === catName);
  }

  results.sort((a, b) => {
    const aOk = a.status === 'ok' && !a.autoDsq, bOk = b.status === 'ok' && !b.autoDsq;
    if (aOk && !bOk) return -1; if (!aOk && bOk) return 1;
    if (!aOk) return 0;
    if (a.stTotal > 0 && !b.stTotal) return -1; if (!a.stTotal && b.stTotal > 0) return 1;
    return a.total - b.total;
  });

  document.getElementById('clasifTitle').textContent = catName;
  document.getElementById('clasifMeta').textContent =
    `${results.filter(r => r.stTotal > 0 && r.status === 'ok').length} finalizados · ${results.length} pilotos`;

  let pos = 0, leader = null;
  const html = results.map(r => {
    const ok = r.status === 'ok' && r.stTotal > 0;
    if (ok) { pos++; if (leader === null) leader = r.total; }
    const podium = ok && pos <= 3 ? `podium-${pos}` : '';
    const posEl = ok ? (pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : pos+'°') : '—';
    const stEl = r.status === 'dnf' ? '<span class="pr-status dnf">DNF</span>'
               : r.status === 'dsq' ? '<span class="pr-status dsq">DSQ</span>'
               : r.finished ? '<span class="pr-status fin">✓ FIN</span>'
               : r.stTotal > 0 ? '<span class="pr-status prog">En curso</span>' : '';
    const diff = ok && pos > 1 ? `+${fmtT(r.total - leader)}` : '';
    return `
      <div class="pilot-row ${podium} ${r.status === 'dnf' ? 'dnf' : r.status === 'dsq' ? 'dsq' : ''}"
           onclick="showDetail('${r.id}')">
        <div class="pr-pos">${posEl}</div>
        <div class="pr-dorsal">${r.dorsal}</div>
        <div class="pr-info">
          <div class="pr-name">${r.fullName}</div>
          <div class="pr-cat">${r.categoria}${r.club ? ' · ' + r.club : ''}</div>
        </div>
        <div class="pr-right">
          ${ok ? `<div class="pr-total">${fmtT(r.total)}</div><div class="pr-diff">${diff}</div>` : stEl}
        </div>
      </div>`;
  }).join('') || '<div class="empty"><div class="empty-icon">🏁</div><div class="empty-text">Sin datos aún</div></div>';

  document.getElementById('clasifList').innerHTML = html;
}

function showDetail(riderId, pushState = true) {
  gPilotId = riderId;
  gView = 'detail';
  renderDetail();
  showView('vDetail');
  if (pushState) history.pushState({view:'detail', pid: riderId}, '', '');
}

function renderDetail() {
  if (!gData || !gPilotId) return;
  const cfg = gData.config || {};
  const timing = gData.timing || {};
  const stageData = gData.stageData || {};
  const allRiders = gData.riders || [];
  const schedule = computeSchedule(allRiders.filter(r => !r.dns), cfg);
  const results = buildResults(schedule, cfg, timing, stageData);

  const r = results.find(x => x.id === gPilotId);
  if (!r) { document.getElementById('detailContent').innerHTML = '<button class="back-btn" onclick="showClasif()">← Volver</button>'; return; }

  // Compute position
  const catResults = results.filter(x => x.categoria === r.categoria)
    .filter(x => x.stTotal > 0 && x.status === 'ok')
    .sort((a,b) => a.total - b.total);
  const catPos = catResults.findIndex(x => x.id === r.id) + 1;
  const nS = parseInt(cfg.numStages)||2, nC = parseInt(cfg.numTimeControls)||1;

  let html = `<button class="back-btn" onclick="showClasif()">← ${r.categoria}</button>
    <div class="detail-hero">
      <div class="detail-dorsal">${r.dorsal}</div>
      <div class="detail-info">
        <div class="detail-name">${r.fullName}</div>
        <div class="detail-sub">${r.categoria}${r.club ? ' · ' + r.club : ''}</div>
        <div class="detail-sub" style="margin-top:4px;color:var(--cyan)">
          Salida: ${r.startStr}${r.startPen > 0 ? ' <span style="color:var(--red)">+' + fmtPen(r.startPen) + ' tardío</span>' : ''}
        </div>
      </div>
      ${catPos > 0 ? `<div class="detail-pos">
        <div class="detail-pos-num">${catPos === 1 ? '🥇' : catPos === 2 ? '🥈' : catPos === 3 ? '🥉' : catPos+'°'}</div>
        <div class="detail-pos-label">de ${catResults.length}</div>
      </div>` : ''}
    </div>`;

  // Stage times (tramos)
  if (r.stTotal > 0) {
    html += `<div class="section-title">Tramos cronometrados</div><div class="detail-grid">`;
    for (let l = 1; l <= r.nL; l++) {
      for (let s = 1; s <= nS; s++) {
        const t = r.stTimes[`${s}-${l}`];
        if (t) html += `<div class="detail-cell">
          <div class="detail-cell-label">Tramo ${s} · Vuelta ${l}</div>
          <div class="detail-cell-val good">${fmtT(t)}</div>
        </div>`;
      }
    }
    html += `<div class="detail-cell" style="border-color:rgba(34,211,238,0.3)">
      <div class="detail-cell-label">Σ Cronos</div>
      <div class="detail-cell-val" style="color:var(--cyan)">${fmtT(r.stTotal)}</div>
    </div></div>`;
  }

  // CH times
  let hasCH = false;
  let chHtml = `<div class="section-title">Controles Horarios</div><div class="detail-grid">`;
  for (let l = 1; l <= r.nL; l++) {
    for (let ctrl = 1; ctrl <= nC; ctrl++) {
      const key = `${l}-${ctrl}`;
      const actual = r.chActual[key];
      const exp = r.chExpected[key];
      const pen = r.chPens[key] || 0;
      if (actual || exp) {
        hasCH = true;
        chHtml += `<div class="detail-cell">
          <div class="detail-cell-label">CH${ctrl} · V${l}</div>
          <div class="detail-cell-val ${pen > 0 ? 'pen' : 'good'}">${actual || fmtHHMM(exp)}</div>
          ${pen > 0 ? `<div style="font-size:0.62rem;color:var(--red);margin-top:2px">+${fmtPen(pen)} pen.</div>` : ''}
        </div>`;
      }
    }
  }
  chHtml += '</div>';
  if (hasCH) html += chHtml;

  // Penalties summary
  const hasPen = r.penTotal > 0;
  if (hasPen) {
    html += `<div class="section-title">Penalizaciones</div><div class="detail-grid">`;
    if (r.startPen > 0) html += `<div class="detail-cell"><div class="detail-cell-label">Salida tardía</div><div class="detail-cell-val pen">${fmtPen(r.startPen)}</div></div>`;
    if (r.tcPen > 0) html += `<div class="detail-cell"><div class="detail-cell-label">CHs</div><div class="detail-cell-val pen">${fmtPen(r.tcPen)}</div></div>`;
    if (r.manPen > 0) html += `<div class="detail-cell"><div class="detail-cell-label">Especial</div><div class="detail-cell-val pen">${fmtPen(r.manPen)}</div></div>`;
    html += `<div class="detail-cell" style="border-color:rgba(248,113,113,0.3)">
      <div class="detail-cell-label">Σ Penalizaciones</div>
      <div class="detail-cell-val pen">${fmtPen(r.penTotal)}</div>
    </div></div>`;
  }

  // Total
  if (r.stTotal > 0) {
    html += `<div class="section-title">Resultado</div>
    <div class="detail-cell" style="border-color:rgba(248,113,113,0.4);margin-bottom:1rem">
      <div class="detail-cell-label">Tiempo total</div>
      <div class="detail-cell-val total">${fmtT(r.total)}</div>
    </div>`;
  }

  // Notes
  const rt = gData.timing && gData.timing[r.id];
  if (rt && rt.notes) {
    html += `<div class="section-title">Observaciones</div>
    <div class="detail-cell" style="margin-bottom:1rem">
      <div class="detail-cell-val" style="font-family:inherit;font-size:0.8rem;color:var(--dim)">${rt.notes}</div>
    </div>`;
  }

  document.getElementById('detailContent').innerHTML = html;
}

// ── Navigation con History API ─────────────────────────────────────────────
function updateNavButtons() {
  const onCats = gView === 'cats';
  document.getElementById('btnBack').style.display = onCats ? 'none' : 'inline-block';
  document.getElementById('btnHome').style.display = onCats ? 'none' : 'inline-block';
}

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  updateNavButtons();
}

function showCats(pushState = true) {
  gView = 'cats';
  renderCatList();
  showView('vCats');
  if (pushState) history.pushState({view:'cats'}, '', '');
}

function showClasif(pushState = true) {
  gView = 'clasif';
  renderClasif();
  showView('vClasif');
  if (pushState) history.pushState({view:'clasif', catName: window._clasifCat, catSel: gCatSel}, '', '');
}

function navBack() {
  // Mismo comportamiento que el botón nativo del teléfono
  history.back();
}

function navHome() {
  // Ir al inicio: volver tantos pasos como sea necesario
  if (gView === 'detail') history.go(-2);
  else if (gView === 'clasif') history.go(-1);
}

// Hardware back button (Android)
window.addEventListener('popstate', (e) => {
  const state = e.state || {};
  const dest = state.view || 'cats';
  if (dest === 'detail') {
    if (state.pid) gPilotId = state.pid;
    showDetail(gPilotId, false);
  } else if (dest === 'clasif') {
    // Restaurar tanto el nombre de categoría como el filtro
    if (state.catName !== undefined) window._clasifCat = state.catName;
    if (state.catSel !== undefined) gCatSel = state.catSel;
    showClasif(false);
  } else {
    showCats(false);
  }
});

// ── Init ───────────────────────────────────────────────────────────────────
// Función para (re)programar el timer según visibilidad
function schedulePoll() {
  if (gPollTimer) clearInterval(gPollTimer);
  const ms = document.visibilityState === 'visible' ? POLL_MS_VISIBLE : POLL_MS_HIDDEN;
  gPollTimer = setInterval(fetchData, ms);
}

fetchData();
schedulePoll();
gAgeTimer = setInterval(updateAge, 1000); // actualizar "hace Xs" cada segundo
// Estado inicial: ponemos 'cats' como base del historial
// Añadimos un estado extra vacío para que el primer "atrás" vuelva a cats
// en lugar de salir de la app
history.replaceState({view:'cats'}, '', '');
// Empujar un estado dummy al principio para absorber el primer swipe atrás del sistema
// (Android a veces consume el primer popstate para el gesto de navegación del sistema)
history.pushState({view:'cats'}, '', '');

// Refresh on tab focus
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') fetchData();
  schedulePoll();
});

// ── Service Worker registration (PWA) ──────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => {
      console.warn('SW registration failed (probablemente file://):', err.message);
    });
  });
}
</script>

</html>
