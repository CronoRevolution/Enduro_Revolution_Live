<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Control Horario — Enduro Revolution</title>
<style>
  :root{ --bg:#0c0c0f; --panel:#17171c; --alt:#1f1f27; --border:#2b2b34;
         --text:#e8e8ec; --muted:#8a8a95; --red:#c81e1e; --green:#22c55e;
         --amber:#f59e0b; --cyan:#38bdf8; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--text);
       font-family:'Segoe UI',system-ui,sans-serif; overscroll-behavior:none;
       font-variant-numeric:tabular-nums;}
  .wrap{max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}
  header{padding:0.7rem 1rem; background:var(--panel); border-bottom:1px solid var(--border);
         display:flex; align-items:center; gap:0.6rem;}
  header .t{font-weight:800; font-size:0.95rem;}
  header .sub{font-size:0.66rem; color:var(--muted);}
  .clock{margin-left:auto; text-align:right;}
  .clock .h{font-size:1.15rem; font-weight:800; font-family:monospace;}
  .clock .s{font-size:0.58rem;}
  .syncok{color:var(--green);} .syncwarn{color:var(--amber);} .syncbad{color:var(--red);}
  main{flex:1; padding:1rem; display:flex; flex-direction:column; gap:0.9rem;}
  .card{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:1rem;}
  label{display:block; font-size:0.66rem; color:var(--muted); font-weight:700;
        text-transform:uppercase; letter-spacing:0.04em; margin-bottom:0.35rem;}
  input,select{width:100%; background:var(--alt); border:1px solid var(--border);
        color:var(--text); border-radius:8px; padding:0.6rem 0.7rem; font-size:1rem;
        font-family:inherit;}
  .dorsalIn{font-size:2.4rem; font-weight:800; text-align:center; font-family:monospace;
        letter-spacing:0.05em; padding:0.5rem;}
  .btnPasa{width:100%; background:var(--green); color:#04120a; border:none;
        border-radius:14px; padding:1.5rem; font-size:1.6rem; font-weight:900;
        cursor:pointer; font-family:inherit; letter-spacing:0.03em;
        box-shadow:0 6px 0 #16853f; transition:transform 0.05s, box-shadow 0.05s;}
  .btnPasa:active{transform:translateY(4px); box-shadow:0 2px 0 #16853f;}
  .btnPasa:disabled{background:var(--alt); color:var(--muted); box-shadow:none; cursor:not-allowed;}
  .row{display:flex; gap:0.5rem;}
  .row>*{flex:1;}
  .mini{font-size:0.62rem; color:var(--muted); line-height:1.4;}
  .lista{display:flex; flex-direction:column; gap:0.4rem; max-height:38vh; overflow-y:auto;}
  .fichaje{display:flex; align-items:center; gap:0.7rem; padding:0.55rem 0.7rem;
        background:var(--alt); border-radius:8px; font-size:0.9rem;}
  .fichaje .d{font-weight:800; font-family:monospace; font-size:1.1rem; min-width:2.5rem;}
  .fichaje .hh{font-family:monospace; color:var(--cyan);}
  .fichaje .pend{color:var(--amber); font-size:0.62rem; margin-left:auto;}
  .fichaje .ok{color:var(--green); font-size:0.62rem; margin-left:auto;}
  .fichaje button{background:transparent; border:none; color:var(--red);
        font-size:1.1rem; cursor:pointer; padding:0.2rem 0.4rem;}
  .setup{gap:0.9rem;}
  .banner{padding:0.5rem 0.8rem; border-radius:8px; font-size:0.72rem; font-weight:700;
        text-align:center;}
  .b-off{background:rgba(245,158,11,0.15); color:var(--amber); border:1px solid var(--amber);}
  .b-on{background:rgba(34,197,94,0.12); color:var(--green); border:1px solid var(--green);}
  .btnSec{background:var(--alt); color:var(--text); border:1px solid var(--border);
        border-radius:8px; padding:0.6rem; font-size:0.85rem; cursor:pointer; font-family:inherit; font-weight:700;}
  .toast{position:fixed; left:50%; bottom:1.5rem; transform:translateX(-50%);
        background:var(--green); color:#04120a; padding:0.7rem 1.4rem; border-radius:10px;
        font-weight:800; font-size:1.1rem; box-shadow:0 8px 30px rgba(0,0,0,.5);
        opacity:0; pointer-events:none; transition:opacity 0.2s; z-index:100;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div id="root"></div>

<!-- Firebase (compat, para sencillez y un único fichero) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  CONTROL HORARIO — App de comisario
//  Ficha la hora real de paso de cada dorsal en un CH y la sincroniza al
//  programa central vía Firebase. Funciona offline (cola local) y corrige el
//  desfase del reloj del móvil contra el reloj de servidor (opción B).
// ═══════════════════════════════════════════════════════════════════════════

// --- Config Firebase (misma BD que el resto del sistema) ---
const firebaseConfig = {
  databaseURL: "https://enduro-revolution-live-default-rtdb.firebaseio.com",
};
let db=null, connected=false;
try{
  firebase.initializeApp(firebaseConfig);
  db=firebase.database();
  firebase.auth().signInAnonymously().catch(e=>console.warn("auth",e.message));
  db.ref(".info/connected").on("value",s=>{ connected=!!s.val(); render(); });
}catch(e){ console.warn("Firebase init", e); }

// --- Estado ---
const LS_SETUP="ch_setup", LS_QUEUE="ch_queue";
let setup = load(LS_SETUP) || null;   // { controlId, nombre, stage, lap, ctrl, comisario }
let queue = load(LS_QUEUE) || [];     // fichajes locales: { id, dorsal, horaMs, ts, synced }
let clockOffset = 0;                  // ms a sumar al reloj local para obtener hora "oficial"
let clockState = "pending";           // pending | ok | warn | bad
let dorsalActual = "";

function load(k){ try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;} }
function save(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }

// --- Sincronización de reloj (opción B) ---
// Firebase da un offset estimado entre el reloj local y el del servidor en
// /.info/serverTimeOffset. Lo usamos para corregir cada fichaje.
function initClockSync(){
  if(!db) { clockState="bad"; return; }
  db.ref(".info/serverTimeOffset").on("value", snap=>{
    const off = snap.val();
    if(typeof off === "number"){
      clockOffset = off;
      const abs=Math.abs(off);
      clockState = abs<2000 ? "ok" : abs<10000 ? "warn" : "bad";
      render();
    }
  });
}
function horaOficialMs(){ return Date.now() + clockOffset; }
function fmtHora(ms){
  const d=new Date(ms); const p=(n,w=2)=>String(n).padStart(w,"0");
  return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
function fmtHoraMs(ms){
  const d=new Date(ms); const p=(n,w=2)=>String(n).padStart(w,"0");
  return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}.${p(d.getMilliseconds(),3)}`;
}

// --- Fichar un paso ---
function fichar(dorsal, horaMs){
  const d=String(dorsal).trim();
  if(!d) return;
  const f={ id: (Date.now()+"_"+Math.random().toString(36).slice(2,7)),
            dorsal:d, horaMs, ts:Date.now(), synced:false };
  queue.unshift(f);
  save(LS_QUEUE, queue);
  toast(`✓ ${d}  ${fmtHora(horaMs)}`);
  dorsalActual="";
  sincronizar();
  render();
}

// --- Sincronización de la cola a Firebase ---
let syncing=false;
function sincronizar(){
  if(!db || !connected || syncing || !setup) return;
  const pend = queue.filter(f=>!f.synced && !f.anulado);
  if(!pend.length) return;
  syncing=true;
  const ref = db.ref("chFichajes/"+setup.controlId);
  Promise.all(pend.map(f=>{
    return ref.push({
      dorsal:f.dorsal, horaMs:f.horaMs,
      stage:setup.stage||null, ctrl:setup.ctrl||null,
      comisario:setup.comisario||null, anulado:false,
      ts: firebase.database.ServerValue.TIMESTAMP,
    }).then(()=>{ f.synced=true; });
  })).then(()=>{
    save(LS_QUEUE, queue); syncing=false; render();
  }).catch(e=>{ console.warn("sync",e.message); syncing=false; });
}
// Reintento periódico de sincronización (por si vuelve la cobertura)
setInterval(sincronizar, 8000);

// --- Latido de presencia: el central sabe que este CH está vivo ---
// Publica en chPresencia/{controlId} cada 20s: nombre, comisario, últimos datos.
function pushPresencia(){
  if(!db || !connected || !setup) return;
  const pend = queue.filter(f=>!f.synced).length;
  const ultimo = queue.length ? queue[0].horaMs : null;
  db.ref("chPresencia/"+setup.controlId).set({
    controlId:setup.controlId, nombre:setup.nombre||"",
    stage:setup.stage||null, ctrl:setup.ctrl||null, comisario:setup.comisario||null,
    lastSeen: firebase.database.ServerValue.TIMESTAMP,
    totalFichajes: queue.length, pendientes: pend,
    ultimoFichajeMs: ultimo,
    clockState, clockOffsetMs: Math.round(clockOffset),
  }).catch(()=>{});
}
setInterval(pushPresencia, 20000);

function anular(id){
  const f=queue.find(x=>x.id===id); if(!f) return;
  // Si ya se sincronizó, marcamos anulado en Firebase (el central lo ignora)
  if(f.synced && db && setup){
    // No sabemos el pushId; para simplificar, subimos un fichaje "anulado" que
    // el central interpretará por dorsal+horaMs. Alternativamente, el central
    // deduplica por (dorsal,horaMs). Marcamos local:
  }
  queue = queue.filter(x=>x.id!==id);
  save(LS_QUEUE, queue); render();
}

// --- UI ---
function toast(msg){
  let t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast"; t.className="toast"; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"), 1400);
}

function pantallaSetup(){
  const s=setup||{};
  return `
  <div class="wrap">
    <header><div><div class="t">Control Horario</div><div class="sub">Configuración inicial</div></div></header>
    <main class="setup">
      <div class="card">
        <label>Nombre del control (para identificarlo)</label>
        <input id="s_nombre" placeholder="Ej: CH2 Bosque" value="${s.nombre||''}">
        <div class="mini" style="margin-top:0.3rem">Este nombre te ayuda a ti; el central lo reconoce por crono/vuelta/control.</div>
      </div>
      <div class="card">
        <div class="row">
          <div><label>Crono</label><input id="s_stage" type="number" min="1" max="9" placeholder="1" value="${s.stage||''}"></div>
          <div><label>CH nº</label><input id="s_ctrl" type="number" min="1" max="9" placeholder="1" value="${s.ctrl||''}"></div>
        </div>
        <div class="mini" style="margin-top:0.5rem">Indica a qué crono perteneces y qué número de CH eres. La vuelta NO se elige: el programa la deduce solo, para evitar confusiones cuando llegan pilotos de vueltas distintas mezclados.</div>
      </div>
      <div class="card">
        <label>Tu nombre (comisario) — opcional</label>
        <input id="s_comisario" placeholder="Ej: Juan" value="${s.comisario||''}">
      </div>
      <button class="btnPasa" style="font-size:1.2rem;padding:1rem" onclick="guardarSetup()">Empezar a fichar →</button>
      <div class="mini" style="text-align:center">Reloj: ${clockBadge()}</div>
    </main>
  </div>`;
}

function clockBadge(){
  const map={ ok:['syncok','✓ sincronizado'], warn:['syncwarn','⚠ desfase moderado'],
              bad:['syncbad','✗ sin sincronizar'], pending:['syncwarn','sincronizando…'] };
  const [cls,txt]=map[clockState]||map.pending;
  const off = clockState==='ok'||clockState==='warn'||clockState==='bad' ? ` (${clockOffset>=0?'+':''}${(clockOffset/1000).toFixed(1)}s)` : '';
  return `<span class="${cls}">${txt}${off}</span>`;
}

function pantallaFichar(){
  const pend = queue.filter(f=>!f.synced).length;
  return `
  <div class="wrap">
    <header>
      <div><div class="t">${setup.nombre||'Control'}</div>
      <div class="sub">C${setup.stage||'?'} · CH${setup.ctrl||'?'}${setup.comisario?' · '+setup.comisario:''}</div></div>
      <div class="clock"><div class="h" id="liveclock">${fmtHora(horaOficialMs())}</div>
        <div class="s">${clockBadge()}</div></div>
    </header>
    <main>
      ${!connected ? `<div class="banner b-off">📴 Sin conexión — fichando en local (${pend} sin subir). Se sincronizará solo al recuperar señal.</div>`
                   : pend>0 ? `<div class="banner b-off">Subiendo ${pend} fichaje(s)…</div>`
                   : `<div class="banner b-on">✓ En línea y sincronizado</div>`}
      <div class="card">
        <label>Dorsal</label>
        <input class="dorsalIn" id="dorsalIn" inputmode="numeric" pattern="[0-9]*"
               placeholder="—" value="${dorsalActual}"
               oninput="dorsalActual=this.value">
      </div>
      <button class="btnPasa" id="btnPasa" onclick="onPasa()">PASA  ⏱</button>
      <div class="row">
        <button class="btnSec" onclick="onPasaManual()">✎ Con otra hora</button>
        <button class="btnSec" onclick="cambiarControl()">⚙ Cambiar control</button>
      </div>
      <div>
        <label>Últimos fichajes</label>
        <div class="lista" id="lista">
          ${queue.slice(0,30).map(f=>`
            <div class="fichaje">
              <span class="d">${f.dorsal}</span>
              <span class="hh">${fmtHora(f.horaMs)}</span>
              ${f.synced?'<span class="ok">✓ subido</span>':'<span class="pend">⏳ local</span>'}
              <button onclick="anular('${f.id}')" title="Anular">✕</button>
            </div>`).join('') || '<div class="mini">Aún no has fichado a nadie.</div>'}
        </div>
      </div>
    </main>
  </div>`;
}

function render(){
  const root=document.getElementById("root");
  root.innerHTML = setup ? pantallaFichar() : pantallaSetup();
  const di=document.getElementById("dorsalIn");
  if(di && document.activeElement!==di){ /* mantener valor */ }
}

// Reloj en vivo en cabecera (sin re-render completo, para fluidez)
setInterval(()=>{
  const c=document.getElementById("liveclock");
  if(c) c.textContent=fmtHora(horaOficialMs());
}, 250);

// --- Handlers globales ---
window.guardarSetup=function(){
  const g=id=>document.getElementById(id).value.trim();
  const nombre=g("s_nombre"), stage=parseInt(g("s_stage"))||null,
        ctrl=parseInt(g("s_ctrl"))||null, comisario=g("s_comisario");
  if(!stage||!ctrl){ alert("Indica crono y número de CH."); return; }
  const controlId=`c${stage}_ch${ctrl}`;
  setup={ controlId, nombre:nombre||`C${stage}CH${ctrl}`, stage, ctrl, comisario };
  save(LS_SETUP, setup);
  pushPresencia();
  render();
};
window.onPasa=function(){
  if(!dorsalActual.trim()){ toast("Escribe el dorsal primero"); return; }
  fichar(dorsalActual, horaOficialMs());
};
window.onPasaManual=function(){
  if(!dorsalActual.trim()){ toast("Escribe el dorsal primero"); return; }
  const h=prompt("Hora de paso (HH:MM:SS), hoy:", fmtHora(horaOficialMs()));
  if(!h) return;
  const m=h.match(/^(\d{1,2}):(\d{2}):(\d{2})$/);
  if(!m){ alert("Formato: HH:MM:SS"); return; }
  const now=new Date(horaOficialMs());
  now.setHours(+m[1], +m[2], +m[3], 0);
  fichar(dorsalActual, now.getTime());
};
window.anular=anular;
window.cambiarControl=function(){
  if(confirm("¿Cambiar la configuración del control? Tus fichajes locales se conservan.")){
    setup=null; save(LS_SETUP,null); render();
  }
};

// --- Arranque ---
initClockSync();
render();
sincronizar();
</script>
</body>
</html>
